<script>
// Single-page site: send any unknown path back to the home page.
// Works both at earth-doctors.com/ and at codes90.github.io/Earth-Doctors/.
if (location.protocol === 'http:' || location.protocol === 'https:') {
  var base = location.hostname.endsWith('github.io')
    ? '/' + location.pathname.split('/')[1] + '/'
    : '/';
  location.replace(base);
}
</script>
